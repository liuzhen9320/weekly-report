    body: 这次改的核心是把之前硬编码的分隔符解析逻辑改成流式tokenized处理，遇到分隔符不会直接拆分，而是先判断是不是token的一部分，完全兼容了之前的所有用例，没有破坏性变更。PR改了6个文件，过了所有本地门禁，最后顺利合入主分支。
