  - type: review-summary
    heading: Solo Review Spree
    body: Mass-reviewed 8 PRs before lunch, averaging 15 minutes per review. No external reviewers were involved—this was
      all self-policing to maintain code quality. The streak ended abruptly when I realized I'd forgotten to hydrate.
