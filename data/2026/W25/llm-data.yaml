  - type: activity-pattern
    heading: Commits vs. Caffeine
    body: Peak productivity hit on Tuesday with 10 commits, fueled by a 5-hour caffeine binge. Thursday and Friday slowed
      down to 2-1 commits each, likely due to context-switching between auth and frontend work.
    chips:
      - label: peak
