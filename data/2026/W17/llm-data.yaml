        color: green
  - type: activity-pattern
    heading: 前松后紧的 weird 节奏，周中突然开挂
    body: 这周的提交节奏非常极端，周一到周四前四天每天只有2次提交，属于平稳的日常迭代，周四突然拉到11次，周五6次，周末两天直接飙到16次，完全是把工作堆到了后半周。这种节奏虽然短期产出高，但是代码质量容易出问题，下周得调整，尽量把工作平摊到整周，避免最后两天赶工。
