  - type: tech-debt
    heading: 闷头清理1200+行遗留认证代码，删到爽
    body: 这周没开任何PR、没做任何跨团队Review，全都在闷头清理auth服务里的遗留认证逻辑，把2024年遗留的老JWT校验逻辑、已经停用的OAuth2
      v1兼容代码全删了，还顺手优化了用户登录、权限校验两个核心接口的响应逻辑，本地压测通过率100%，下周会把这些改动整理成PR提交，顺便补上之前漏的单元测试。
