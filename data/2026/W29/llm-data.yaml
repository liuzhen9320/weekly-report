  - type: deep-dive
    heading: PKCE token nonce validation
    body: I dug into the nonce validation logic and discovered that an off‑by‑one error could cause intermittent token
      rejections. Fixing it required a careful review of the cryptographic random generator usage and added a fallback
      for low‑entropy environments.
