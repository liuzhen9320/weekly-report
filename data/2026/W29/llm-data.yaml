title: OAuth2 PKCE lands in the auth service
subtitle: Implemented the new PKCE flow across the auth service repository, paving the way for tighter security.
overview: >
  This week I finally shipped the OAuth2 PKCE migration to the auth service after weeks of design and testing. The
  change adds a cryptographically‑secure code challenge to every authorization request, closing a long‑standing security
  gap.


  The rollout involved updating the token endpoint, adding nonce validation, and writing extensive unit tests. I hit a
  few surprising edge cases with token nonces, which taught me the importance of strict entropy checks and led to a
  small refactor of the crypto helper library.


  Looking ahead, the next step is to roll out the changes to the client libraries and monitor adoption metrics. Early
  internal tests show a 15% drop in token‑related errors, which is encouraging.
