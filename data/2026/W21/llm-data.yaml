highlights:
  - type: pr
    title: "fix(deps): Update Rust crate shlex to v2 (main)"
    repo: liuzhen9320/bird-lg-rs
    meta: merged May 22 · +16 -10 · 2 files
    body: 这个依赖升级解决了旧版 shlex 在构建文档时的编译错误，顺带将 crate 升级到 v2 版本，避免了后续潜在的 API 兼容性问题，是本周改动里最基础也最必要的一个。
    url: https://github.com/liuzhen9320/bird-lg-rs/pull/13
  - type: pr
    title: "refactor(frontend): DOM text reinterpreted as HTML"
    repo: liuzhen9320/bird-lg-rs
    meta: merged May 19 · +11 -3 · 1 files
    body: 这个 PR 修复了 GitHub 代码扫描标记的高危 XSS 安全告警，修复方案符合前端安全最佳实践，彻底堵上了动态 DOM 内容的脚本注入风险，比单纯屏蔽告警靠谱得多。
    url: https://github.com/liuzhen9320/bird-lg-rs/pull/16
  - type: pr
    title: "Potential fix for code scanning alert no. 7: Workflow does not contain permissions"
    repo: liuzhen9320/bird-lg-rs
    meta: opened May 24 · +3 -0 · 1 files
    body: 这个 PR 给 CI workflow 加了显式的 permissions 块，遵循最小权限原则，合并后就能清掉最后一个代码扫描告警，下周合了就能拿到全绿的安全扫描结果。
    url: https://github.com/liuzhen9320/bird-lg-rs/pull/17
