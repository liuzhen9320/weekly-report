  - type: commit-summary
    heading: 提交节奏的两极分化
    body: "这周的提交量分布特别有意思，周一集中干了 18 个提交，把大部分计划内的改动都堆在那天搞定了，其中就包括 'fix(ci): remove useless jobs' 和 'refactor(ci): update cicd
      files' 两个 CI 相关的提交，顺带把构建流程简化了不少。之后周中每天只有 1-3 个提交，属于正常的收尾和测试节奏。没想到周五又突然来了个小爆发，连续推了 6
      个提交修小问题，看来我确实是赶在周初冲量、周中摸鱼、周五收尾的固定节奏。"
    chips:
