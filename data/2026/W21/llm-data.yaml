title: liuzhen9320/bird-lg-rs 完成 shlex v2 升级、CI 精简与前端 XSS 修复
subtitle: 本周聚焦该 Rust 前端工具的安全加固与依赖更新，共处理 3 个 PR、24 次提交，仅剩 1 个 CI 权限告警待下周处理
overview: >
  这周的工作几乎全部投入在个人维护的 Rust 前端工具 liuzhen9320/bird-lg-rs 上，原本只计划做个小的依赖升级，结果顺手把积压的 CI 配置优化和 GitHub 自动扫描出的安全告警一起处理了，没想到最后还剩下一个
  workflow 权限相关的告警待收尾。整体改动都很聚焦，没有跨项目切换上下文，效率出奇的高。


  周初先搞定了最省心的依赖更新，把 shlex crate 升级到 v2 版本，顺带清理了 CI 里没用的构建 job，直接把构建流程简化了不少。没想到周三的时候 GitHub 代码扫描自动抛出了两个前端 XSS
  相关的高危告警，赶紧花了半天时间做了 DOM 文本转义的修复，给动态路径组件加了允许列表校验和 URL 编码，彻底堵上了脚本注入的风险。


  这周没有对外协作，也没有接新的需求，所有工作都是围绕现有代码的可维护性和安全性做小步迭代，改动都很小但都很扎实。下周打算把剩下的 workflow 权限告警修掉，再考虑给项目补几个基础的集成测试用例，提升一下代码的可靠性。
summaries:
  - type: deep-dive
    heading: 前端 XSS 告警修复全记录
    body: GitHub 代码扫描自动识别出 bird-lg-rs 前端存在将 DOM 派生文本误解析为 HTML 的 XSS 风险，属于高危安全漏洞。修复时没有选择简单屏蔽告警，而是按照前端安全最佳实践处理：所有从 DOM
      获取的动态值都标记为不可信输入，对路径这类有明确格式要求的字段做允许列表校验，同时对动态路径组件做 URL 编码，从根源上避免了恶意脚本注入的可能。
    chips:
      - label: 漏洞等级
        value: 高危 XSS
        color: red
      - label: 修复方案
        value: 允许列表 + URL 编码
        color: orange
      - label: 涉及文件
        value: 1 个前端文件
        color: default
  - type: repo-summary
    heading: bird-lg-rs 本周改动全景
    body: 本周所有 PR、提交和代码修改都集中在 liuzhen9320/bird-lg-rs 这一个仓库，没有涉及其他项目的协作或对外贡献。改动覆盖三个方向：依赖升级、CI
      配置精简、安全修复，都是围绕提升项目的安全性和可维护性做的小步迭代，没有引入大的功能变更，风险极低。
    chips:
