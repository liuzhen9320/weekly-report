    body: 这周完全没有跨项目的协作或者对外贡献，所有精力都花在 bird-lg-rs 上，连代码审查都只有 1
      次，大部分时间都是自己闷头改代码、跑测试、修告警，不需要来回切换上下文，效率比多项目并行的时候高了不少。唯一的遗憾是没来得及给项目补集成测试用例，只能留到下周了。
