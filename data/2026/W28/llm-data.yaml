        color: default
highlights:
  - type: pr
    title: "chore(deps)!: Update Rust crate tera (1.20.1 ➔ 2.0.0) (main)"
    repo: liuzhen9320/bird-lg-rs
    meta: +7 -325 · 2 files
    body: This PR upgrades the tera template engine to version 2.0.0, bringing performance improvements and new features.
      The change keeps our Rust project aligned with the latest upstream releases.
    url: https://github.com/liuzhen9320/bird-lg-rs/pull/40
