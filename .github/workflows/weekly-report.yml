# Generated by: github-weekly-reporter setup
# Docs: https://github.com/deariary/github-weekly-reporter

name: Weekly Report

on:
  schedule:
    - cron: '0 17 * * 0'  # Monday, 1 hour after daily fetch (Asia/Shanghai)
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD, default: today)'
        required: false
        type: string

permissions:
  contents: write
  pages: write

env:
  SITE_TITLE: 'liuzhen9320 DevNews'

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: deariary/github-weekly-reporter@main
        with:
          github-token: ${{ secrets.GH_PAT }}
          username: 'liuzhen9320'
          mode: 'weekly'
          language: 'zh-CN'
          timezone: 'Asia/Shanghai'
          theme: 'brutalist'
          date: ${{ inputs.date }}
          llm-provider: 'openrouter'
          llm-model: 'stepfun/step-3.7-flash'
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
